version: 2
updates:
  # Update Python dependencies via uv (handles pyproject.toml + uv.lock)
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    # Optional: group related updates to reduce noise
    groups:
      production-dependencies:
        dependency-type: "production"
      development-dependencies:
        dependency-type: "development"
    # Limit open PRs to avoid overwhelming the repo
    open-pull-requests-limit: 10

  # Also keep GitHub Actions up to date
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
