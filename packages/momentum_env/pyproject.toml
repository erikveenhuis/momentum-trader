[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "momentum_env"
version = "0.2.0"
description = "A flexible trading environment for reinforcement learning"
authors = [
  { name="Erik Veenhuis" },
]
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.14"
classifiers = [
    "Programming Language :: Python :: 3",
    "Operating System :: OS Independent",
]
dependencies = [
    "gymnasium==1.3.0",
    "numpy==2.4.4",
    "pandas==3.0.2",
    "momentum-core==0.1.0",
]

[dependency-groups]
dev = [
    "build==1.4.4",
    "pytest==9.0.3",
    "ruff",
    "twine==6.2.0",
]

[project.urls]
"Homepage" = "https://github.com/your_username/momentum-trader"
"Bug Tracker" = "https://github.com/your_username/momentum-trader/issues"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-ra -q"
