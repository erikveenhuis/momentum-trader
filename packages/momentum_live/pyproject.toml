[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "momentum_live"
version = "0.1.0"
description = "Live trading for momentum strategy"
authors = [
  { name="Erik Veenhuis" },
]
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.14"
classifiers = [
    "Programming Language :: Python :: 3",
    "Operating System :: OS Independent",
]
dependencies = [
    "momentum_agent==0.2.0",
    "momentum_env==0.2.0",
    "momentum-core==0.1.0",
    "alpaca-py>=0.43.4",
    "numpy>=2.4.6",
    "pandas>=3.0.3",
    "requests>=2.34.2",
    # alpaca-py 0.43.2 imports pytz from alpaca.data.requests but doesn't
    # declare it as a dependency. Pin it here so warmup-time imports of the
    # historical bar API don't crash with ModuleNotFoundError.
    "pytz>=2026.2",
]

[dependency-groups]
dev = [
    "pytest>=9.1.1",
    "ruff>=0.15.18",
]

[project.scripts]
momentum-live = "momentum_live.cli:main"
momentum-live-reset = "momentum_live.reset_cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-ra -q"
