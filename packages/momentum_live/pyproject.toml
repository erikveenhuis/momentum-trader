[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "momentum_live"
version = "0.1.0"
description = "Live trading for momentum strategy"
authors = [
  { name="Erik Veenhuis" },
]
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.13"
classifiers = [
    "Programming Language :: Python :: 3",
    "Operating System :: OS Independent",
]
dependencies = [
    "momentum_agent==0.2.0",
    "momentum_env==0.2.0",
    "momentum-core==0.1.0",
    "alpaca-py==0.43.2",
    "numpy==2.4.4",
    "pandas==3.0.2",
]

[project.optional-dependencies]
dev = [
    "pytest==9.0.0",
    "ruff",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-ra -q"
