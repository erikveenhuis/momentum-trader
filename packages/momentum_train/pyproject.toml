[build-system]
requires = ["setuptools>=61.0,<82"]
build-backend = "setuptools.build_meta"

[project]
name = "momentum_train"
version = "0.2.0"
description = "Training module for momentum trader"
authors = [
  { name="Erik Veenhuis" },
]
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.14"
classifiers = [
    "Programming Language :: Python :: 3",
    "Operating System :: OS Independent",
]
dependencies = [
    "torch>=2.11.0",
    "numpy==2.4.4",
    "PyYAML==6.0.3",
    "momentum_agent==0.2.0",
    "momentum_env==0.2.0",
    "momentum-core==0.1.0",
    # Required at runtime: torch.utils.tensorboard imports the standalone
    # `tensorboard` package at module load (see torch/utils/tensorboard/__init__.py),
    # so even though we only use SummaryWriter we must install it here.
    # (The .tb-venv from scripts/tensorboard.sh is a *separate* install used
    # only to launch the web UI.)
    "tensorboard==2.20.0",
    # TensorBoard 2.20 imports pkg_resources, which was removed in setuptools>=82.
    "setuptools<82",
]

[dependency-groups]
dev = [
    "pytest==9.0.3",
    "pytest-cov==7.1.0",
    "ruff",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-ra -q -m 'not benchmark'"
markers = [
    "integration: marks tests as integration tests",
    "unit: marks tests as unit tests",
    "unittest: marks tests as unit tests",
    "tb_logging: marks tests that exercise TensorBoard SummaryWriter capture",
    "benchmark: long-running performance benchmarks; excluded from the default suite (run explicitly with `pytest -m benchmark`).",
]
