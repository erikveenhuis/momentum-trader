[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "momentum-core"
version = "0.1.0"
description = "Core utilities for momentum trader"
authors = [
    {name = "Momentum Trader Team"}
]
dependencies = []
requires-python = ">=3.13"
readme = "README.md"

[project.optional-dependencies]
dev = ["pytest", "ruff"]

[tool.setuptools.packages.find]
where = ["src"]
