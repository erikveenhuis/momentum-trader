# Configuration for Rainbow DQN Trading Agent Training

window_size: 60

logging:
  log_filename: training.log
  root_level: INFO
  console_level: INFO
  file_level: INFO
  level_overrides:
    Trainer: INFO
    Agent: INFO
    DataManager: INFO
    TransformerModel: INFO
    Buffer: INFO
    Metrics: INFO
    Evaluation: INFO

agent:
  # Core RL params
  gamma: 0.99           # Increased from 0.95; minute-scale trades still care about future bars
  lr: 0.0003            # Reduced from 5e-4; more stable with large batch + Polyak updates
  batch_size: 8192      # Reduced from 16384; better PER prioritization, still GPU-saturating
  replay_buffer_size: 1000000  # Doubled from 500k; more diverse replay with 24k training files
  target_update_freq: 1000     # Logging frequency only (Polyak updates every step regardless)

  # Network architecture
  window_size: 60
  n_features: 12
  hidden_dim: 256
  num_actions: 6  # Target allocation: 0%, 20%, 40%, 60%, 80%, 100%

  # Transformer params
  nhead: 4
  num_encoder_layers: 3
  dim_feedforward: 512
  transformer_dropout: 0.1

  # Rainbow params
  n_steps: 3            # Reduced from 5; shorter horizon for minute-scale momentum trades
  num_atoms: 101
  v_min: -10.0
  v_max: 10.0
  categorical_logging_interval: 2000
  categorical_logging_percentiles: [5, 25, 50, 75, 95]
  alpha: 0.6            # PER priority exponent
  beta_start: 0.4       # Increased from 0.3; less bias early on
  beta_frames: 200000   # Reduced from 400k; reach full IS correction sooner

  # LR scheduler
  lr_scheduler_enabled: true
  lr_scheduler_type: 'CosineAnnealingLR'  # Smoother than ReduceLROnPlateau for long runs
  lr_scheduler_params:
    T_max: 500000       # Cosine period in learner steps (~full training run)
    eta_min: 0.00001    # Floor LR

  # Other agent params
  grad_clip_norm: 1.0
  polyak_tau: 0.005
  store_partial_n_step: true
  debug: false

environment:
  window_size: 60
  initial_balance: 1000.0
  transaction_fee: 0.001
  reward_scale: 1.0         # Reduced from 10; keeps n-step returns well within C51 support [-10,10]
  invalid_action_penalty: -0.1   # Slightly stronger signal for masked-but-still-penalized actions
  drawdown_penalty_lambda: 0.5
  slippage_bps: 5.0
  opportunity_cost_lambda: 0.1  # Penalizes holding cash when asset moves; scales with abs(price_return) * cash_fraction
  min_rebalance_pct: 0.02      # Minimum allocation delta to trigger a trade (2% of portfolio)
  min_trade_value: 1.0         # Minimum trade notional in USD (Alpaca crypto minimum)

# Data processing params (used by preprocess_npz.py, not passed to TradingEnvConfig)
feature_rolling_window: 20   # Lookback bars for derived features (realized vol, volume ratio, HL range)

trainer:
  seed: 42
  warmup_steps: 20000       # With action masking, warmup produces cleaner transitions
  update_freq: 20           # Learn every 20 env steps (~20 min of bars); more diverse recent experience
  gradient_updates_per_step: 3  # 3 gradient updates per trigger; 216 updates per 1440-bar episode
  log_freq: 60
  per_stats_log_freq: 0
  validation_freq: 50       # Increased from 20; less validation overhead, each validates 246 files
  checkpoint_save_freq: 50
  reward_window: 20
  reward_clip: 5.0          # Tighter clip to match reward_scale=1 and C51 support
  early_stopping_patience: 6  # Increased from 4; more patience with cosine LR
  final_phase_lr_start_frac: 0.85  # Later start since cosine already decays smoothly
  final_phase_lr_multiplier: 0.3
  min_validation_threshold: 0.001

# --- Run Configuration --- #
run:
  mode: 'train'
  episodes: 50000
  model_dir: 'models'
  resume: false
  specific_file: null
  skip_evaluation: false
