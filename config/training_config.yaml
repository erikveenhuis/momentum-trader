# Configuration for Rainbow DQN Trading Agent Training
#
# === Active probe #12 (2026-06-24) — critic stability resume from ep10200 topk ===
# Probe #11 (flat curriculum fresh run) halted @ ep ~11536: val 0.25 / PV $605, TD mean ~1200+.
# Best artifact: models/checkpoint_trainer_topk_20260624_ep10200_score_0.4311.pt (val -7.8%).
# Root cause: IQN Q-scale drift (not data corruption); n-step rewards still O(1e-3) at TD blow-up.
#
# Probe #12 bundle (stability, keep encoder + value head):
#   lr 1.5e-5 -> 1e-5; polyak_tau 0.001 -> 0.005; PER alpha 0.45 -> 0.35;
#   per_priority_cap 50 -> 25; update_freq 40 -> 60; keep curriculum_mode flat.
#   NO --reset-value-head-on-resume (preserve weights at best topk).
#
# --- Step 0: quarantine stale high-episode checkpoints (resume picks MAX ep in models/) ---
#   mkdir -p models/_quarantine_probe12
#   mv models/checkpoint_trainer_latest_* models/_quarantine_probe12/ 2>/dev/null || true
#   mv models/checkpoint_trainer_latest_*.buffer models/_quarantine_probe12/ 2>/dev/null || true
#   Keep: checkpoint_trainer_topk_20260624_ep10200_score_0.4311.pt (+ other topk if desired)
#
# --- Step 1: resume from ep10200 topk ---
#   uv run python -m momentum_train.run_training --config_path config/training_config.yaml \\
#     --resume --reset-buffer-on-resume --reset-lr-on-resume --reset-noisy-on-resume \\
#     --benchmark-frac-override 0.45
#
# Pass/fail (STOP EARLY — max ~400–600 episodes):
#   * PASS  -> Train/TD_Error_Mean stays < ~500; val score > ~0.40 and improving; no 100% one-action val x2
#   * FAIL  -> TD > ~500 sustained ~200 learner steps; val flat/worse x2; train single action > ~70%
#
# --- Prior probe #11 (2026-06-21) — FRESH flat curriculum; halted ep11536 val 0.25 ---
# TD crept 0.2 -> 1200+ over ~16M env steps; overtrading on val (not flat 0.5846 basin).
#
# Curriculum modes (trainer section):
#   flat                  — uniform random over ALL train files (active)
#   linear_chronological  — legacy 0.3→1.0 ramp over run length
#   recent                — uniform over newest curriculum_recent_frac of files
#
# --- Prior probe #9 (2026-06-19) — short escape from ep3007; collapsed action 4 @ ep7115 ---
# lr 1.5e-5, update_freq 40, num_vector_envs 4. Val locked 0.5846 / 100% action 4. Halt.
#
# --- Prior probe #8 (lr 2e-5, polyak 0.001, eps_end 0.10): re-collapsed to 100% val action 3 @ 0.5673 ---
# iqn_bootstrap_mode: greedy. TD blow-up ~850k env steps; val flat from collapse.
#
# --- Prior probe #3 (2026-05-25, double-DQN — FAILED long run) ---
# iqn_bootstrap_mode: double. Held off +41k Q blow-up early; TD re-climbed to ~12k by ep ~15k.
#
# --- Prior probe #2 header (2026-05-23, target-net greedy — PARTIAL) ---
# iqn_bootstrap_mode: greedy. Spike ~880k env / ~44k learner; recovery then re-creep.
#
# --- Prior probe #1 header (2026-05-22, soft bootstrap — FAILED) ---
# PER hygiene + tau_M=0.01 + lr=2e-5. See experiment log below for TD trajectory.
#
# --- Experiment log (PER / IQN stability) ---
# Prior polluted long run: models/runs/20260505-101223 (alpha=0 ablation mid-run; TD/Q blow-up).
# Current fresh run: archive-on-fresh-start, TB models/runs/20260511-202918, progress.jsonl from 2026-05-11.
# Config: PER alpha=0.45, munchausen_entropy_tau=0.001, munchausen_alpha=0, lr=5e-5.
#
# Update 2026-05-21 — fresh run HALTED ~2026-05-16 12:38 (logs/training.log; no error/early-stop line;
#   last lines are normal PER/TD stats — likely process killed or machine stop, ~5 days idle since):
#   * Span: first val 2026-05-11 21:52 → last activity 2026-05-16 12:38 (~4.6 days wall clock).
#   * progress.jsonl: ~10,312 episodes, ~14.85M env steps, 51 validations.
#   * Best val (excl. V1 flat): score ~0.529, avg_return ~-4.0%, PV ~960 (2026-05-12 23:21).
#   * Last val before halt: score ~0.399, avg_return ~-7.0%, PV ~930 (2026-05-16 11:24);
#     early_stop_counter=0 — not early stopping.
#   * Last training episode logged: ep ~10312, PV ~565, total_return ~-43.5% (train slice still harsh;
#     val better than train episodes — different files / less friction).
#   * training.log at halt: TD error mean ~1.5e5–3.1e5 @ learner ~742k; PER alpha=0.45, beta=1.0,
#     buffer full — per-step rewards still O(1e-3) in n-step window; critic scale still far above ~50 ballpark.
# Interpretation: fresh run improved val vs the May 5–11 continuation (~-4% best vs ~-11% old best), but
#   TD/critic pathology persists; halt was external, not convergence. Resume only if you accept same basin;
#   otherwise n_steps cut, encoder-only warm-start, or LR/polyak probe (list below).
#
# Next probes (LR already 5e-5): one change per short run, watch Train/TD_Error_Mean and
#   Train/Quantile/Max vs bounded-reward ballpark (~50 with |r|<=0.5, gamma=0.99):
#   1) tau_M=0.001 + alpha=0.45 — ran on fresh run; val OK-ish but TD still ~1e5+ at halt — move on.
#   2) n_steps: 3 -> 1 — active probe (2026-05-22 fresh run; shorter bootstrap horizon).
#   3) Resume with fresh IQN heads + empty PER (encoder + counters kept):
#        uv run python -m momentum_train.run_training --config_path config/training_config.yaml \\
#          --resume --reset-value-head-on-resume --reset-buffer-on-resume
#      Use checkpoint 20260516_ep10303 (quarantine 20260521_* first). Drops optimizer + buffer.
#   3b) Fresh encoder warm-start (migrate / best_*) with new value head — if resume feels stale.
#   4) polyak_tau: 0.005 -> 0.01 — only if target lag suspected.
#   5) LR 5e-5 -> 2e-5 — last resort; pair with (2) or (3).

window_size: 60

logging:
  log_filename: training.log
  root_level: INFO
  console_level: INFO
  file_level: INFO
  level_overrides:
    Trainer: INFO
    Agent: INFO
    DataManager: INFO
    TransformerModel: INFO
    Buffer: INFO
    Metrics: INFO
    Evaluation: INFO

agent:
  # Core RL params
  gamma: 0.99           # Increased from 0.95; minute-scale trades still care about future bars
  # lr lowered 1e-4 -> 5e-5 at the BTR-v3 cutover (2026-04-29 16:08). BTR-v2
  # ran ~43h with healthy validation (peak 0.3911 @ ep7403) but TD-error mean
  # exploded geometrically from 0.5 (cutover) to 52,000 (Apr 29 15:58) — Q
  # values drifted 5-6 OOM above the theoretical reward bound r/(1-gamma) ~ 4.
  # Same exponential-overestimation pattern in BTR-v1 (warm buffer, nhead=4)
  # and BTR-v2 (fresh buffer, nhead=8), so the cause is structural to the
  # PER + DDQN-IQN + Munchausen recipe, not buffer composition. Lower LR
  # gives the optimiser less per-step compounding and lets the slow Polyak
  # target catch up before each batch's bootstrap is itself stale.
  # 2026-05-22 stability probe (paired with tau_M=0.01 and PER cap=50): cut
  # lr 5e-5 -> 2e-5 to slow per-step compounding into the bootstrap. Last-
  # resort knob from the probe ladder (see header item 5); used together
  # with the cap/clamp PER fix so the buffer can no longer amplify a
  # single TD spike for millions of steps.
  lr: 0.00001           # Probe #12: down from 1.5e-5; slow Q compounding after ep10200 resume
  # batch_size kept at 8192 for BTR-v3. Earlier draft of BTR-v3 lowered
  # this to 4096 as a belt-and-suspenders move against PER concentration,
  # but the dominant divergence levers are lr / polyak_tau /
  # gradient_updates_per_step (all tuned below); cutting batch on top of
  # those would have left the GPU at ~21% VRAM with no further stability
  # margin. Keeping 8192 maintains GPU saturation per gradient step and,
  # combined with num_vector_envs=8 below, keeps wall-clock throughput up.
  batch_size: 8192      # Unchanged from BTR-v2 (deliberately reverted from a 4096 draft)
  replay_buffer_size: 1000000  # Doubled from 500k; more diverse replay with 24k training files
  target_update_freq: 1000     # Logging frequency only (Polyak updates every step regardless)

  # Network architecture
  window_size: 60
  n_features: 12
  hidden_dim: 256
  num_actions: 6  # Target allocation: 0%, 20%, 40%, 60%, 80%, 100%

  # Transformer params
  # nhead bumped 4 -> 8 at the BTR-v2 cutover (2026-04-27 20:50). Effective per-
  # head dim drops from 64 to 32 but total embed_dim stays at hidden_dim=256, so
  # PyTorch nn.MultiheadAttention parameter shapes are *identical* (in_proj
  # 768x256, out_proj 256x256) and the C51-pretrained encoder weights load
  # cleanly; only the internal head split changes. Rationale: BTR-v1 ran with
  # 4 heads and showed poor specialisation (action mix went near-uniform after
  # the first IQN validation, suggesting the attention layer wasn't routing
  # distinct sub-features); 8 heads gives the model finer-grained routing
  # capacity for free.
  nhead: 8
  num_encoder_layers: 3
  dim_feedforward: 512
  transformer_dropout: 0.1

  # Rainbow + IQN params
  n_steps: 1            # Probe 2026-05-22: was 3; 1-step returns + gamma^1 bootstrap to limit TD amplification
  # IQN distributional head (replaces C51 num_atoms/v_min/v_max). Quantile
  # samples are drawn fresh every step from U(0, 1); the network learns the
  # quantile function rather than fixed-support probabilities.
  n_quantiles_online: 64    # K samples for the online network (loss path)
  n_quantiles_target: 64    # K' samples for the target/bootstrap path
  n_quantiles_policy: 32    # samples averaged for argmax during action selection
  quantile_embedding_dim: 64  # cosine basis size for phi(tau) in CosineQuantileEmbedding
  huber_kappa: 1.0          # Huber threshold inside the quantile-Huber loss
  quantile_logging_interval: 2000           # cadence for Train/Quantile/* TB scalars
  quantile_logging_percentiles: [5, 25, 50, 75, 95]

  # Munchausen DQN target augmentation (Vieillard et al. 2020). The Munchausen
  # bonus is layered on top of the IQN target: alpha * tau * log pi(a_t | s_t),
  # where pi is the entropy-regularised softmax of the *target* network's
  # expected Q values. Set ``munchausen_alpha=0`` to fall back to vanilla IQN
  # for ablations.
  munchausen_alpha: 0.0         # Scales the log-pi bonus; stays 0 during Option A probe
  # BTR-v5 Option A (2026-04-30): ``munchausen_entropy_tau`` is NOT only for
  # Munchausen -- ``_compute_munchausen_iqn_target_quantiles`` still builds the
  # bootstrap target from softmax(q_target / tau_M) over actions even when
  # alpha=0. tau_M=0.03 produced an overly diffuse target policy that, with
  # runaway absolute Q scales (~1e5) and PER, compounded bootstrap noise. Cut
  # tau_M to sharpen toward target-net greedy / near-argmax weighting (~6× vs
  # 0.03). Tightened 0.005 -> 0.001 (2026-05). May 2026 TB: critic scales still worsened — see header Update.
  # 2026-05-22 stability probe: raise tau_M 0.001 -> 0.01 so the soft-IQN
  # target distribution is less peaky when Q magnitudes drift. Tiny tau in
  # the prior run effectively collapsed the softmax onto a single (possibly
  # mis-scaled) target quantile, amplifying any critic-side error. 0.01 is
  # still bounded enough that the Munchausen bonus stays in [-0.01, 0] per
  # step (alpha=0 currently, so the bonus contributes 0 regardless).
  munchausen_entropy_tau: 0.01  # Used by soft bootstrap / Munchausen bonus only; ignored when mode=greedy
  munchausen_log_pi_clip: -1.0  # Floor on log-pi; only binds when munchausen_alpha > 0
  # IQN bootstrap at s': ``greedy`` = target-net argmax (probe #4, 2026-06-02);
  # ``double`` = Rainbow Double-DQN (probe #3, failed at scale); ``soft`` = softmax mix.
  iqn_bootstrap_mode: greedy

  # Spectral normalization on the dueling head NoisyLinear weights (BTR Stage 3).
  # Constrains the operator norm of weight_mu in value/advantage streams to
  # damp the implicit Q-value drift caused by Polyak target updates.
  spectral_norm_enabled: true
  # Tier 3a/b/c/d diagnostic cadences. 0 disables the corresponding stream.
  noisy_sigma_logging_interval: 2000   # matches quantile cadence
  q_value_logging_interval: 250
  q_value_histogram_interval: 2500     # 10x the scalar cadence (heavier)
  grad_logging_interval: 250
  target_net_logging_interval: 250
  td_error_logging_interval: 100
  # PER: priority = (|TD|+eps)**alpha. Restored 0.45 after alpha=0 did not fix critic drift (header).
  alpha: 0.35           # Probe #12: down from 0.45; softer PER on outlier TD spikes
  beta_start: 0.4       # Increased from 0.3; less bias early on
  beta_frames: 200000   # Reduced from 400k; reach full IS correction sooner
  # PER priority hygiene (added 2026-05-22 to break the
  # max_priority -> new-store -> TD-spike feedback loop). New transitions
  # enter at this fixed alpha-space priority instead of inheriting the
  # historical max; the cap clamps per-update priorities so a single
  # blown batch cannot dominate sampling for millions of steps.
  per_new_transition_priority: 1.0  # Canonical PER default; decoupled from max_priority
  per_priority_cap: 25.0            # Probe #12: down from 50; |TD|<=~1.1k before clip at alpha=0.35

  # LR scheduler — disabled for probe #7 short escape run (constant lr above).
  lr_scheduler_enabled: false
  lr_scheduler_type: 'CosineAnnealingLR'  # Re-enable for long runs after escape probe
  lr_scheduler_params:
    T_max: 50000000     # Cosine period in learner steps (~full training run)
    eta_min: 0.00001    # Floor LR

  # Exploration (epsilon-greedy on top of NoisyNets)
  epsilon_start: 0.3    # Initial random action probability; NoisyNets alone collapse to constant action
  epsilon_end: 0.12     # Probe #9: up from 0.10; moderate exploration without probe #7 chaos
  epsilon_decay_steps: 8000000  # Probe #7: extended from 2M — re-anneal curve at high env_steps

  # Action entropy regularization
  entropy_coeff: 0.0    # Disabled; benchmark-relative reward structurally prevents action collapse

  # Other agent params
  grad_clip_norm: 1.0
  # polyak_tau raised back 0.001 -> 0.005 at the BTR-v3 cutover. The "more
  # inertia" framing assumed reward signal was stable enough that a slow-
  # moving target would average out noise. In practice, with PER prioritising
  # high-|TD-error| transitions, a 1000-step target lag (1/tau) gave the
  # online net plenty of room to drift Q upward between target updates,
  # which then encoded the drift into the bootstrap target. tau=0.005 cuts
  # the lag to ~200 steps, killing the slow-bootstrap-pressure feedback
  # loop while still keeping the target net distinct from online.
  polyak_tau: 0.005     # Probe #12: up from 0.001; faster target tracking (~200-step lag)
  store_partial_n_step: true
  debug: false

  # Tier 2.1: auxiliary return-prediction head (shares the Transformer encoder
  # with the main distributional head). ``aux_target_feature_index`` is the
  # column of the ``market_data`` window used as the regression target; in the
  # current 12-feature schema column 6 is ``log_ret_1``.
  aux_loss_weight: 0.1
  aux_target_feature_index: 6

environment:
  window_size: 60
  initial_balance: 1000.0
  transaction_fee: 0.001
  reward_scale: 1.0         # Per-step rewards O(1e-4 to 1e-3); IQN has unbounded support so reward magnitude is unconstrained
  invalid_action_penalty: -0.1   # Slightly stronger signal for masked-but-still-penalized actions
  drawdown_penalty_lambda: 0.3   # Midpoint: 0.5 caused death spirals, 0.15 caused action collapse to 100% exposure
  slippage_bps: 5.0
  opportunity_cost_lambda: 0.0   # Disabled; subsumed by benchmark-relative reward
  benchmark_allocation_frac: 0.5  # Default for live trader / random agent / single-shot eval; trainer overrides per-episode via the schedule below
  min_rebalance_pct: 0.02      # Minimum allocation delta to trigger a trade (2% of portfolio)
  min_trade_value: 1.0         # Minimum trade notional in USD (Alpaca crypto minimum)

# Data processing params (used by preprocess_npz.py, not passed to TradingEnvConfig)
feature_rolling_window: 20   # Lookback bars for derived features (realized vol, volume ratio, HL range)

trainer:
  seed: 42
  # num_vector_envs raised 4 -> 8 at the BTR-v3 cutover. Doubles wall-clock
  # env-step throughput (env loop was the bottleneck, not the GPU) and
  # halves PER-buffer turnover time, which evicts stale high-|TD-error|
  # transitions ~2x faster -- a mild stability win on top of the lr / tau /
  # gradient_updates changes. Divergence dynamics are decoupled from this
  # axis (they live on the learner-call counter), so no stability cost.
  # Costs: 2x CPU load on env-stepping subprocesses (fine on >= 8 physical
  # cores) and 2x learner-call frequency in wall-clock terms. Within the
  # YAML's documented "4-8 recommended" supported band.
  num_vector_envs: 4        # Probe #9: down from 8; fewer grad updates/hour for stability
  warmup_steps: 20000       # With action masking, warmup produces cleaner transitions
  update_freq: 60           # Probe #12: up from 40; fewer learner calls per env step
  # gradient_updates_per_step lowered 2 -> 1 at the BTR-v3 cutover. With
  # update_freq=20 and 2 grad updates/step the agent did 1 grad update per
  # 10 env steps; combined with batch_size=8192 and PER, the off-policy
  # bootstrap pressure was high enough to compound Q-value drift faster
  # than the target net could equilibrate. 1 grad update per 20 env steps
  # halves bootstrap pressure and roughly matches Rainbow/BTR reference
  # impls when num_vector_envs >= 4.
  gradient_updates_per_step: 1  # Reduced from 2 for BTR-v3 stability run
  log_freq: 60
  per_stats_log_freq: 300
  validation_freq: 200      # Less frequent validation; avoids judging a still-learning policy too often
  checkpoint_save_freq: 50
  # Disk hygiene: cap how many `checkpoint_trainer_latest_*` files are kept
  # on disk after each save. Each checkpoint is ~9 GB (PER buffer dominates),
  # so an unbounded 50k-episode run @ checkpoint_save_freq=50 would need
  # ~9 TB. With keep_last_n=30 the periodic-checkpoint footprint stays
  # bounded at ~270 GB — fits a 500 GB partition while giving
  # `recover_from_collapse.py --from-episode N` a ~1500-episode rollback window
  # at checkpoint_save_freq=50 (the V51-era gap that motivated this raise).
  # Notes:
  #   - 0 disables rotation (keep every save). Use only when disk is unlimited.
  #   - `best_*.pt`, `peak_*`, `topk_*`, and `recover` outputs are never rotated
  #     by this pass — only the periodic `latest_*` stream is.
  #   - The most recent N (sorted by episode number in the filename) survive.
  #   - Safe to change between `--resume` runs; the new value takes effect on
  #     the next periodic save.
  latest_checkpoint_keep_last_n: 5
  reward_window: 20
  reward_clip: 0.5          # Soft cap on per-step reward magnitude (IQN itself has unbounded support)
  # Early stopping + best_validation_metric tracking deferred until benchmark
  # anneal completes (see benchmark_allocation_frac_anneal_episodes).
  min_episodes_before_early_stopping: 15000
  # Top-K / peak / threshold-gated best_* saves — separate gate (code fix 2026-06-02).
  # Align with validation_freq so first real val at ep 200 can pin checkpoints.
  min_episodes_before_checkpoint_pinning: 200
  early_stopping_patience: 12  # Increased from 6; more runway for slow convergence
  final_phase_lr_start_frac: 0.85  # Later start since cosine already decays smoothly
  final_phase_lr_multiplier: 0.3
  min_validation_threshold: 0.001

  # Top-K best-validation ring. Independent of ``min_validation_threshold``:
  # the K highest-scoring validation runs are pinned on disk as
  # ``checkpoint_trainer_topk_<DATE>_ep<N>_score_<X>.pt`` (~50 MB, no buffer).
  # Small improvements still enter the ring; flat-benchmark vals (~0.596 with
  # ~0% return) are skipped when ``top_k_skip_flat_benchmark`` is true so
  # active-trading peaks (~0.54) are not evicted. 0 disables the ring.
  top_k_best_checkpoints: 10
  top_k_skip_flat_benchmark: true
  top_k_flat_score_threshold: 0.585
  top_k_flat_max_abs_return_pct: 2.0
  # Peak stream: full ``latest_*``-style checkpoint + PER buffer whenever
  # validation strictly improves checkpoint_pin_best_metric (after
  # min_episodes_before_checkpoint_pinning). Use for recovery after collapse;
  # ~9 GB per file. 0 disables. Reduced 8 -> 3 to cap disk (~27 GB).
  peak_checkpoint_keep_last_n: 3

  # Training-file pool sampling (``schedules.compute_curriculum_sampling``).
  # Probe #11/#12: flat = uniform random over all ~23k train files every episode.
  curriculum_mode: flat
  curriculum_start_frac: 0.3    # linear_chronological only (legacy default ramp start)
  curriculum_end_frac: 1.0      # linear_chronological only (legacy default ramp end)
  curriculum_recent_frac: 0.25  # recent only: newest 25% of files (e.g. 2023–2024)

  # Benchmark allocation frac schedule (linear anneal from start -> end across
  # the first N episodes; anchored on absolute episode index so --resume keeps
  # the schedule going). Reward = (market+trade)_return - frac * price_return,
  # so a high frac forces the agent to clear that fraction of the bar's drift
  # to be reward-neutral. Useful early as anti-collapse pressure; once the
  # agent has demonstrated non-flat action diversity it becomes structural
  # long bias, which fights the sniper objective.
  # Anneal length (15k eps) is longer than min_episodes_before_early_stopping (5k):
  # checkpoint pins can start at ep 5000 while anti-flat benchmark pressure
  # continues through ep 15000.
  #
  # Extended 2026-05-05 after fresh BTR-v3 run early-stopped at ep ~7400 with
  # ~70% action-0 (flat) policy collapse. The previous schedule (0.50 -> 0.10
  # over 5000 eps) released anti-flat pressure too quickly and bottomed at a
  # frac low enough that "do nothing" became a reward-positive equilibrium.
  # Two changes:
  #   * end raised 0.10 -> 0.20: keep some long-bias floor so a perfectly
  #     flat policy is still mildly penalized indefinitely (~20% of the bar's
  #     drift must be cleared to be reward-neutral).
  #   * anneal_episodes raised 5000 -> 15000: 3x slower release means the
  #     policy has more episodes at strong anti-flat pressure to learn a
  #     non-trivial action repertoire before pressure relaxes.
  benchmark_allocation_frac_start: 0.5
  benchmark_allocation_frac_end: 0.20
  benchmark_allocation_frac_anneal_episodes: 15000

# --- Run Configuration --- #
run:
  mode: 'train'
  episodes: 50000
  model_dir: 'models'
  resume: false
  specific_file: null
  skip_evaluation: false
  # Without --resume: move prior checkpoints, replay sidecars, progress.jsonl,
  # validation/test exports, trades JSONL, and rainbow_transformer_*.pt out of
  # model_dir into ``models/_archive/pre_fresh_<tag>/`` so stale high-episode
  # latest_* files cannot delete the new run's checkpoints. Ignored when --resume
  # is set. Override with ``--skip-archive-on-fresh-start`` if needed.
  archive_model_dir_before_fresh_start: true
  # Also archive ``runs/`` (TensorBoard). Default false — can be multi‑GB.
  archive_tensorboard_runs: false
