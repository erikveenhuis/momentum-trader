[tool.ruff]
line-length = 140
target-version = "py313"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP"]
ignore = ["E501", "UP038"]

[tool.ruff.lint.per-file-ignores]
"**/tests/**/*.py" = ["F841", "E501"]
"scripts/**/*.py" = ["E402"]

[tool.pytest.ini_options]
norecursedirs = [
    ".git",
    "venv",
    "logs",
    "models",
    "results",
    "data",
    "tests/test_networks_old.py",
]
addopts = "-ra --color=yes -rP --cov=packages --cov-report=html -m 'not benchmark'"
testpaths = [
    "packages/momentum_core/tests",
    "packages/momentum_env/tests",
    "packages/momentum_agent/tests",
    "packages/momentum_train/tests",
    "packages/momentum_live/tests",
]
pythonpath = [
    ".",
    "packages/momentum_core/src",
    "packages/momentum_env/src",
    "packages/momentum_agent/src",
    "packages/momentum_train/src",
    "packages/momentum_live/src",
]
python_files = "test_*.py"
python_classes = "Test*"
python_functions = "test_*"
markers = [
    "integration: marks tests as integration tests",
    "unit: marks tests as unit tests",
    "tb_logging: marks tests that exercise TensorBoard SummaryWriter capture",
    "benchmark: long-running performance benchmarks; excluded from the default suite (run explicitly with `pytest -m benchmark`).",
]
